name: Terraform Apply

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_k8s_version: ${{ vars.K8S_VERSION }}
      TF_VAR_doks_cluster_name: ${{ secrets.DO_K8S_CLUSTER_NAME }}
      TF_VAR_doks_node_name: ${{ vars.DOKS_NODE_NAME }}
      TF_VAR_db_database_name: ${{ vars.DB_DATABASE_NAME }}
      TF_VAR_db_cluster_name: ${{ vars.DB_CLUSTER_NAME }}
      TF_VAR_pg_db_cluster_name: ${{ vars.TF_VAR_pg_db_cluster_name }} 
      TF_VAR_pg_db_database_name: ${{ vars.TF_VAR_pg_db_database_name }} 
      TF_VAR_mysql_cluster_name: ${{ vars.TF_VAR_mysql_cluster_name }} 
      TF_VAR_mysql_database_name_video: ${{ vars.TF_VAR_mysql_database_name_video }} 
      TF_VAR_mysql_database_name_auth: ${{ vars.TF_VAR_mysql_database_name_auth }} 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::601920909369:role/aws-actions
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
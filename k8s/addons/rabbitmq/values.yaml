image:
  repository: bitnamilegacy/rabbitmq
  tag: 4.1.3-debian-12-r1

global:
  security:
    allowInsecureImages: true

auth:
  username: guest
  password: guest 
  erlangCookie: "CHANGEMECOOKIE"

persistence:
  enabled: true
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP

metrics:
  enabled: true
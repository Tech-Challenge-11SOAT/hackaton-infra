apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: hackaton
data:
  SPRING_APPLICATION_NAME: "hackathon-notification"

  MAIL_HOST: "mailhog-service"
  MAIL_PORT: "1025"

  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_LISTENER_AUTO_STARTUP: "true"
  RABBITMQ_RETRY_MAX_ATTEMPTS: "3"
  RABBITMQ_RETRY_INITIAL_INTERVAL_MS: "1000ms"
  RABBITMQ_RETRY_MULTIPLIER: "2.0"
  RABBITMQ_RETRY_MAX_INTERVAL_MS: "10000ms"

  RABBITMQ_DLX: "notification.dlx"
  VIDEO_COMPLETED_QUEUE: "video.completed"
  VIDEO_FAILED_QUEUE: "video.failed"

  EMAIL_ENGINE_FROM: "no-reply@hackathon.local"
  EMAIL_ENGINE_TO_FALLBACK_DOMAIN: "example.com"
  EMAIL_ENGINE_DEFAULT_RECIPIENT: ""

  MANAGEMENT_SERVER_PORT: "8081"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "never"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
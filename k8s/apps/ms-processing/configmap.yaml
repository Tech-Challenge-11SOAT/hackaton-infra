apiVersion: v1
kind: ConfigMap
metadata:
  name: processing-config
  namespace: hackaton
data:
  # HTTP Server
  HTTP_PORT: "8080"
  HTTP_READ_TIMEOUT: "10s"
  HTTP_WRITE_TIMEOUT: "10s"
  HTTP_IDLE_TIMEOUT: "30s"
  HTTP_SHUTDOWN_TIMEOUT: "15s"

  # Logging
  LOG_LEVEL: "info"

  # PostgreSQL
  POSTGRES_MAX_CONNS: "10"
  POSTGRES_MIN_CONNS: "2"
  POSTGRES_MAX_CONN_LIFETIME: "30m"
  POSTGRES_HEALTHCHECK_PERIOD: "30s"

  # RabbitMQ
  RABBITMQ_QUEUE_VIDEO_PROCESS: "video.process"
  RABBITMQ_QUEUE_STATUS_UPDATE: "status.update"
  RABBITMQ_QUEUE_VIDEO_COMPLETED: "video.completed"
  RABBITMQ_QUEUE_VIDEO_FAILED: "video.failed"
  RABBITMQ_CONSUMER_TAG: "processing-service-consumer"
  RABBITMQ_PREFETCH_COUNT: "1"

  # AWS S3
  S3_REGION: "us-east-1"
  S3_INPUT_BUCKET: "hackaton-fiap-grupo213-videos"
  S3_OUTPUT_BUCKET: "hackaton-fiap-grupo213-frames"
  S3_USE_PATH_STYLE: "false"

  # Worker
  WORKER_CONCURRENCY: "1"
  WORKER_FFMPEG_BIN: "ffmpeg"

  001_create_processing_jobs.sql: |
    CREATE TABLE IF NOT EXISTS processing_jobs (
        id UUID PRIMARY KEY,
        video_id UUID NOT NULL UNIQUE,
        s3_video_key VARCHAR(1024) NOT NULL,
        s3_zip_key VARCHAR(1024),
        status VARCHAR(20) NOT NULL CHECK (status IN ('PENDING', 'PROCESSING', 'COMPLETED', 'FAILED')),
        frame_count INTEGER NOT NULL DEFAULT 0 CHECK (frame_count >= 0),
        error_message TEXT,
        started_at TIMESTAMPTZ,
        completed_at TIMESTAMPTZ,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_processing_jobs_status ON processing_jobs (status);
    CREATE INDEX IF NOT EXISTS idx_processing_jobs_created_at ON processing_jobs (created_at DESC);